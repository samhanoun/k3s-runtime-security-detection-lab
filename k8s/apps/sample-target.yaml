apiVersion: v1
kind: Namespace
metadata:
  name: runtime-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-target
  namespace: runtime-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-target
  template:
    metadata:
      labels:
        app: sample-target
    spec:
      containers:
      - name: app
        image: alpine:3.20
        command: ["sh","-c","sleep 360000"]
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
          limits: { cpu: "200m", memory: "256Mi" }
